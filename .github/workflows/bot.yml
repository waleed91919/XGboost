name: Polymarket BTC Bot

on:
  schedule:
    # Läuft exakt alle 5 Minuten (UTC)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Erlaubt manuelles Starten über die GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Erlaubt das Zurückschreiben der paper_trades_log.csv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trading Bot
        run: python gh_action_bot.py

      - name: Commit and Push Paper Trades
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add paper_trades_log.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update paper trades log [skip ci]" && git push)
